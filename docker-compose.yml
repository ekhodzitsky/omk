version: "3.8"

services:
  omk-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    command: ["hud", "--web", "--port", "8080"]
    volumes:
      - omk-state:/root/.local/state/omk
      - omk-data:/root/.local/share/omk
    environment:
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  omk-state:
  omk-data:
