name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.
          close-issue-message: |
            This issue has been automatically closed due to inactivity. Please feel free to reopen if it's still relevant.
          close-pr-message: |
            This pull request has been automatically closed due to inactivity. Please feel free to reopen if it's still relevant.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
